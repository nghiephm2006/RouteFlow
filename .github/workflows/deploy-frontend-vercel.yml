name: Deploy Frontend (Vercel)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "shipper-route-optimization/**"
      - ".github/workflows/deploy-frontend-vercel.yml"

jobs:
  deploy:
    name: Deploy Angular app to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shipper-route-optimization
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: shipper-route-optimization/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
