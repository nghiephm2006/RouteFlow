services:
  postgres:
    image: postgres:17-alpine
    container_name: routeflow-postgres
    environment:
      POSTGRES_DB: routeflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "routeflow-local-change-me"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: RouteFlow.Backend/RouteFlow.Api/Dockerfile
    container_name: routeflow-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=routeflow;Username=postgres;Password=routeflow-local-change-me"
      Cors__AllowedOrigins__0: "http://localhost:8080"
      Database__ApplyMigrationsOnStartup: "true"
      Features__EnableSwagger: "true"
    ports:
      - "8081:8080"

  frontend:
    build:
      context: .
      dockerfile: shipper-route-optimization/Dockerfile
    container_name: routeflow-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres-data:
