services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: routeflow-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "routeflow-local-change-me"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - sqlserver-data:/var/opt/mssql

  backend:
    build:
      context: .
      dockerfile: RouteFlow.Backend/RouteFlow.Api/Dockerfile
    container_name: routeflow-backend
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=RouteFlowDb;User Id=sa;Password=routeflow-local-change-me;TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true"
      Cors__AllowedOrigins__0: "http://localhost:8080"
      Database__ApplyMigrationsOnStartup: "true"
      Features__EnableSwagger: "true"
    ports:
      - "8081:8080"

  frontend:
    build:
      context: .
      dockerfile: shipper-route-optimization/Dockerfile
    container_name: routeflow-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  sqlserver-data:
